name: Update Brazil ticket dashboard

on:
  workflow_dispatch:
  schedule:
    # 9:05 AM and 6:05 PM Eastern during daylight saving time.
    - cron: "5 13,22 * * *"

permissions:
  contents: write

concurrency:
  group: update-brazil-ticket-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install -e .

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Scrape ticket data
        run: |
          python -m src.brazil_ticket_monitor.scrape \
            --state data/state.json \
            --out data/runs \
            --mode full

      - name: Build published dashboard data
        run: python scripts/build_dashboard_data.py

      - name: Commit and push dashboard update
        run: |
          if git diff --quiet -- data/dashboard.json; then
            echo "No dashboard data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/dashboard.json
          git commit -m "Update Brazil ticket dashboard data"
          git push
